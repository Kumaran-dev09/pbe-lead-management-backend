spring.application.name=phoenix-bakery-backend

server.port=8080

# ==========================
# DATABASE
# ==========================

spring.datasource.url=jdbc:mysql://localhost:3306/phoenix_bakery_crm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata

spring.datasource.username=root

spring.datasource.password=root@09

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

